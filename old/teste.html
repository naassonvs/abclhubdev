<!DOCTYPE html>
<html>
<head>
  <title>Teste Firebase</title>
</head>
<body>
  <h1>Testando Firebase...</h1>
  <pre id="log"></pre>

  <script type="module">
    import { salvarVenda, buscarVendasPorAno } from './db.js';

    const log = document.getElementById('log');

    async function testar() {
      try {
        log.textContent += '⏳ Salvando venda...\n';
        
        const vendaId = await salvarVenda({
          tipo: 'vendinha',
          produto: 'Suco Natural',
          quantidade: 3,
          valor: 15.00,
          forma_pagamento: 'dinheiro',
          operador_uid: 'operador_001',
          ano_acampamento: 2025
        });

        log.textContent += `✅ Venda salva com ID: ${vendaId}\n`;

        log.textContent += '⏳ Buscando vendas...\n';
        const vendas = await buscarVendasPorAno(2025);
        
        log.textContent += `✅ ${vendas.length} vendas encontradas\n`;
        log.textContent += JSON.stringify(vendas, null, 2);

      } catch (erro) {
        log.textContent += `❌ Erro: ${erro.message}\n`;
      }
    }

    testar();
  </script>
</body>
</html>
