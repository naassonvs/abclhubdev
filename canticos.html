<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cânticos — ABCL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e0f;
      --card: #111618;
      --card2: #1a1f22;
      --borda: #2a3135;
      --suave: #7a8a92;
      --texto: #e8eef4;
      --verde-cl: #34d399;
      --verde-claro: #6ee7b7;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html, body { width: 100%; height: 100%; font-family: var(--font); background: var(--bg); color: var(--texto); }
    body { display: flex; flex-direction: column; }
    .header {
      background: linear-gradient(135deg, rgba(52,211,153,.08) 0%, rgba(110,231,183,.04) 100%);
      border-bottom: 1px solid var(--borda);
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; font-family: 'Cinzel', serif; color: var(--verde-claro); }
    .header p { font-size: 0.9rem; color: var(--suave); }
    .container { flex: 1; max-width: 1000px; width: 100%; margin: 0 auto; padding: 1.5rem; }
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    .search { flex: 1; min-width: 200px; }
    .search input { width: 100%; padding: 0.75rem 1rem; background: var(--card2); border: 1px solid var(--borda); border-radius: 8px; color: var(--texto); font-size: 0.9rem; outline: none; }
    .search input:focus { border-color: var(--verde-cl); }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--borda); border-radius: 20px; color: var(--suave); font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--verde-cl); color: var(--verde-cl); background: rgba(52,211,153,.08); }
    .lista-canticos { display: grid; gap: 1.5rem; }
    .cantico-item { background: var(--card2); border: 1px solid var(--borda); border-radius: 12px; padding: 1.5rem; transition: border-color 0.2s; cursor: pointer; }
    .cantico-item:hover { border-color: var(--verde-cl); }
    .cantico-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
    .cantico-icone { width: 48px; height: 48px; background: var(--card); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .cantico-info h2 { font-size: 1.15rem; margin-bottom: 0.4rem; color: var(--verde-claro); }
    .cantico-meta { font-size: 0.8rem; color: var(--suave); margin-bottom: 0.6rem; }
    .cantico-meta span { margin-right: 1rem; }
    .cantico-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tag { font-size: 0.7rem; background: var(--card); border: 1px solid var(--borda); border-radius: 12px; padding: 0.2rem 0.6rem; color: var(--suave); }
    .cantico-letra-preview { font-size: 0.85rem; color: var(--suave); line-height: 1.6; margin-bottom: 1rem; max-height: 100px; overflow: hidden; }
    .cantico-actions { display: flex; gap: 0.75rem; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 7px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--verde-cl); color: var(--bg); font-weight: 500; }
    .btn-primary:hover { background: var(--verde-claro); }
    .btn-ghost { background: transparent; border: 1px solid var(--borda); color: var(--texto); }
    .btn-ghost:hover { border-color: var(--verde-cl); color: var(--verde-cl); }
    
    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--borda); border-radius: 16px; padding: 2rem; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-family: 'Cinzel', serif; color: var(--verde-claro); margin-bottom: 1.5rem; font-size: 1.3rem; }
    .modal-section { margin-bottom: 1.5rem; }
    .modal-section label { display: block; font-size: 0.8rem; color: var(--suave); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-section p { font-size: 0.9rem; line-height: 1.6; color: var(--texto); white-space: pre-wrap; }
    .modal-section .meta { font-size: 0.8rem; color: var(--suave); margin-bottom: 0.5rem; }
    .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
    .modal-actions .btn { padding: 0.6rem 1.5rem; }
    
    /* Responsivo */
    @media (max-width: 768px) {
      .header { padding: 1.5rem 1rem; }
      .header h1 { font-size: 1.8rem; }
      .container { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .search input { width: 100%; }
      .filters { width: 100%; }
      .cantico-item { padding: 1rem; }
      .modal { padding: 1.5rem; }
    }
    
    .empty { text-align: center; padding: 3rem 1rem; color: var(--suave); }
    .empty p { font-size: 0.95rem; margin: 1rem 0; }
    
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--verde-cl); color: var(--bg); padding: 1rem 1.5rem; border-radius: 8px; font-weight: 500; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <h1>🎶 Cânticos e Hinos</h1>
    <p>Letras, tons, apresentações e categorias</p>
  </div>

  <!-- MAIN -->
  <div class="container">
    <!-- CONTROLES -->
    <div class="controls">
      <div class="search">
        <input type="text" id="search-input" placeholder="🔍 Buscar por título, autor ou tag..." />
      </div>
      <div class="filters" id="filter-buttons"></div>
    </div>

    <!-- LISTA -->
    <div class="lista-canticos" id="lista-canticos"></div>
    <div id="empty-state" class="empty" style="display:none;">
      <p>Nenhum cântico encontrado.</p>
    </div>
  </div>

  <!-- MODAL: Visualizar Cântico -->
  <div class="modal-overlay" id="modal-cantico" onclick="if(event.target === this) fecharModal()">
    <div class="modal">
      <h2 id="modal-titulo">Título do cântico</h2>
      
      <div class="modal-section">
        <label>Autor / Compositor</label>
        <p id="modal-autor" style="color: var(--suave);">—</p>
      </div>

      <div class="modal-section">
        <label>Categoria · Tom</label>
        <div class="meta"><span id="modal-categoria">—</span> · <span id="modal-tom">—</span></div>
      </div>

      <div class="modal-section" id="modal-tags-sect" style="display:none;">
        <label>Tags</label>
        <div id="modal-tags" style="display:flex;gap:0.5rem;flex-wrap:wrap;"></div>
      </div>

      <div class="modal-section">
        <label>Letra</label>
        <p id="modal-letra" style="font-family: monospace; font-size: 0.9rem;"></p>
      </div>

      <div class="modal-section" id="modal-drive-sect" style="display:none;">
        <label>Apresentação (Google Drive)</label>
        <p><a id="modal-drive-link" href="#" target="_blank" style="color: var(--verde-cl); text-decoration: none;">📥 Abrir apresentação →</a></p>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>
    // ══ STORAGE ══
    const get = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
    const set = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    // ══ DADOS PADRÃO ══
    const CANTICOS_DEFAULT = [
      {id:1, titulo:'Grande És Tu', autor:'Carl Boberg / Stuart K. Hine', categoria:'Hino', tom:'Ré', tags:['clássico','adoração'], drive:'', letra:'[verso]\nSenhor meu Deus, quando eu maravilhado\nContemplo o mundo que as Tuas mãos criou,\n\n[refrão]\nEntão minh\'alma canta, então minh\'alma canta:\nQuão grande és Tu, quão grande és Tu!', ativo:true},
      {id:2, titulo:'Castelo Forte', autor:'Martinho Lutero', categoria:'Hino', tom:'Fá', tags:['clássico','Reforma'], drive:'', letra:'[verso]\nUm poderoso castelo é o nosso Deus,\nUm bom escudo e forte arma.\n\n[refrão]\nO Senhor é nossa esperança e proteção,\nEle é nossa salvação!', ativo:true},
      {id:3, titulo:'Preciso de Ti', autor:'Tradicional', categoria:'Hino', tom:'Sol', tags:['clássico','súplica'], drive:'', letra:'[verso]\nPreciso de Ti, Senhor,\nA toda hora preciso de Ti.\n\n[refrão]\nNas horas de gozo, nas horas de dor,\nPreciso de Ti, meu Salvador.', ativo:true},
      {id:4, titulo:'A Deus Seja a Glória', autor:'Fanny Crosby', categoria:'Hino', tom:'Lá', tags:['louvor','vitória'], drive:'', letra:'[verso]\nA Deus seja a glória, grandes coisas Ele fez!\n\n[refrão]\nLouvai, louvai ao Senhor!', ativo:true},
      {id:5, titulo:'Sola Scriptura', autor:'Hinário ABCL', categoria:'Cântico', tom:'Mi', tags:['acampamento','Reforma'], drive:'', letra:'[verso]\nSomente a Escritura nos guia na verdade.\n\n[refrão]\nSola Scriptura, Sola Fide!', ativo:true},
    ];

    function getCanticos() {
      const s = get('abcl-canticos');
      if (s && s.length) return s;
      set('abcl-canticos', CANTICOS_DEFAULT);
      return CANTICOS_DEFAULT;
    }

    // ══ RENDER ══
    function render() {
      const busca = (document.getElementById('search-input')?.value || '').toLowerCase();
      const filtroAtivo = document.querySelector('.filter-btn.active')?.dataset.filtro || '';
      const todos = getCanticos().filter(c => c.ativo !== false);
      
      let lista = todos;
      if (busca) {
        lista = lista.filter(c =>
          (c.titulo||'').toLowerCase().includes(busca) ||
          (c.autor||'').toLowerCase().includes(busca) ||
          (c.tags||[]).some(t=>t.toLowerCase().includes(busca))
        );
      }
      if (filtroAtivo) {
        lista = lista.filter(c => (c.tags||[]).includes(filtroAtivo) || c.categoria === filtroAtivo);
      }

      const container = document.getElementById('lista-canticos');
      const empty = document.getElementById('empty-state');
      if (!lista.length) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      container.innerHTML = lista.map(c => `
        <div class="cantico-item" onclick="abrirModal(${c.id})">
          <div class="cantico-header">
            <div class="cantico-icone">🎵</div>
            <div class="cantico-info" style="flex:1;">
              <h2>${c.titulo || '(sem título)'}</h2>
              <div class="cantico-meta">
                <span>${c.autor || '—'}</span>
                <span>${c.categoria || '—'}</span>
                ${c.tom ? `<span>Tom: ${c.tom}</span>` : ''}
              </div>
              ${(c.tags||[]).length ? `<div class="cantico-tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
              ${c.letra ? `<div class="cantico-letra-preview">${formatarLetra(c.letra).substring(0, 150)}...</div>` : ''}
            </div>
          </div>
        </div>`).join('');
    }

    function formatarLetra(letra) {
      return letra.replace(/\[verso\]|\[refrão\]|\[ponte\]/g, '').trim();
    }

    // ══ MODAL ══
    function abrirModal(id) {
      const c = getCanticos().find(x => x.id === id);
      if (!c) return;
      
      document.getElementById('modal-titulo').textContent = c.titulo || '(sem título)';
      document.getElementById('modal-autor').textContent = c.autor || '—';
      document.getElementById('modal-categoria').textContent = c.categoria || '—';
      document.getElementById('modal-tom').textContent = c.tom || '—';

      if ((c.tags||[]).length) {
        document.getElementById('modal-tags-sect').style.display = 'block';
        document.getElementById('modal-tags').innerHTML = c.tags.map(t=>`<span class="tag">${t}</span>`).join('');
      } else {
        document.getElementById('modal-tags-sect').style.display = 'none';
      }

      document.getElementById('modal-letra').textContent = c.letra || '(sem letra)';

      if (c.drive) {
        document.getElementById('modal-drive-sect').style.display = 'block';
        document.getElementById('modal-drive-link').href = c.drive;
      } else {
        document.getElementById('modal-drive-sect').style.display = 'none';
      }

      document.getElementById('modal-cantico').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modal-cantico').classList.remove('open');
    }

    // ══ FILTROS ══
    function renderFiltros() {
      const todos = getCanticos().filter(c => c.ativo !== false);
      const categorias = [...new Set(todos.map(c => c.categoria).filter(Boolean))];
      const tags = [...new Set(todos.flatMap(c => c.tags || []))];
      
      const filtrosUnicos = ['Todos', ...categorias, ...tags];
      const container = document.getElementById('filter-buttons');
      container.innerHTML = filtrosUnicos.map((f, i) => `
        <button class="filter-btn${i === 0 ? ' active' : ''}" data-filtro="${f === 'Todos' ? '' : f}" onclick="document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');render();">${f}</button>`).join('');
    }

    // ══ INIT ══
    document.getElementById('search-input').addEventListener('input', render);
    
    // Sincronizar a cada 500ms com storage (para detectar mudanças do admin)
    setInterval(() => {
      if (Date.now() - (window._lastCanticosCheck || 0) > 500) {
        render();
        window._lastCanticosCheck = Date.now();
      }
    }, 500);

    renderFiltros();
    render();
  </script>
</body>
</html>
