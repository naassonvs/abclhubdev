<html lang="pt-BR" data-theme="dark">
<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%230b1f17'/%3E%3Cpath d='M7 47 L25 22 L34 34 L42 24 L57 47 Z' fill='%234c9a6a'/%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Formulário do Acampamento Bíblico de Conselheiro Lafaiete." />

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyAGENra-_4GMgwhk-C7d26hEMCqmuQcecU",
    authDomain:        "abcl-hub-dev.firebaseapp.com",

  try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); } catch(e) {}
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
  try { firebase.appCheck().activate(new firebase.appCheck.ReCaptchaV3Provider('6LcYAyUtAAAAAJj1yYLnrmo-MThtvjoXAKiLMiGr'), true); } catch(e) { console.warn('[AppCheck] nao ativado:', (e && (e.code||e.message)) || e); }
  window._fdb = (typeof firebase !== 'undefined' && firebase.firestore) ? firebase.firestore() : null;

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root[data-theme="dark"] {
      --bg:        #08120D;
      --card:      #111E16;
      --card2:     #162318;
      --texto:     #EDE8DF;
      --suave:     rgba(237,232,223,0.45);
      --borda:     rgba(64,145,108,0.22);
      --verde-mid: #40916C;
      --verde-cl:  #74C69D;
      --input-bg:  rgba(255,255,255,0.04);
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }
    :root[data-theme="light"] {
      --bg:        #F2EFE8;
      --card:      #FFFFFF;
      --card2:     #F8F5EF;
      --texto:     #1C2E24;
      --suave:     rgba(28,46,36,0.5);
      --borda:     rgba(45,106,79,0.22);
      --verde-mid: #40916C;
      --verde-cl:  #2D6A4F;
      --input-bg:  rgba(0,0,0,0.035);
      --shadow:    0 4px 24px rgba(0,0,0,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--texto);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── Top bar ── */
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: var(--card); border-bottom: 1px solid var(--borda);
      padding: .6rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar-logo { display: flex; align-items: center; gap: .6rem; }
    .top-bar-logo img { width: 28px; height: 28px; }
    .top-bar-logo span { font-family: 'Cinzel', serif; font-size: .82rem; color: var(--verde-cl); }
    .theme-btn {
      background: var(--card2); border: 1px solid var(--borda);
      border-radius: 99px; padding: .3rem .7rem;
      font-size: .7rem; color: var(--suave); cursor: pointer;
      transition: all .2s;
    }
    .theme-btn:hover { border-color: var(--verde-mid); color: var(--verde-mid); }

    /* ── Progress ── */
    .progress-bar {
      height: 3px; background: var(--borda);
      position: sticky; top: 44px; z-index: 49;
    }
    .progress-bar-fill {
      height: 100%; background: var(--verde-mid);
      transition: width .4s ease; width: 0%;
    }

    /* ── Page ── */
    .page { max-width: 600px; margin: 0 auto; padding: 2rem 1.25rem 5rem; }

    /* ── Capa ── */
    .capa-img {
      width: 100%; max-height: 200px; object-fit: cover;
      border-radius: 14px; margin-bottom: 1.5rem;
    }

    /* ── Header ── */
    .form-header {
      text-align: center; margin-bottom: 2rem;
    }
    .form-logo {
      width: 72px; height: 72px; margin: 0 auto .85rem;
      background: rgba(64,145,108,.1); border: 1px solid var(--borda);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .form-logo img { width: 54px; height: 54px; object-fit: contain; }
    .form-titulo {
      font-family: 'Cinzel', serif; font-size: 1.5rem;
      color: var(--texto); margin-bottom: .4rem;
    }
    .form-subtitulo { font-size: .88rem; color: var(--suave); line-height: 1.6; }

    /* ── Seção ── */
    .form-secao {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem;
      box-shadow: var(--shadow); transition: background .3s;
    }
    .secao-titulo {
      font-size: .68rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--verde-cl); font-weight: 600; margin-bottom: .35rem;
    }
    .secao-desc { font-size: .78rem; color: var(--suave); }

    /* ── Campo ── */
    .campo { margin-bottom: 1.1rem; }
    .campo:last-child { margin-bottom: 0; }
    .campo-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--suave); margin-bottom: .4rem;
      display: flex; align-items: center; gap: .3rem;
    }
    .campo-label .req { color: var(--verde-cl); }
    .campo-desc { font-size: .75rem; color: var(--suave); margin-bottom: .45rem; line-height: 1.5; }

    .campo input, .campo select, .campo textarea {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--borda); border-radius: 10px;
      padding: .8rem 1rem; font-family: 'Inter', sans-serif;
      font-size: 1rem; color: var(--texto); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .campo input:focus, .campo select:focus, .campo textarea:focus {
      border-color: var(--verde-mid);
      box-shadow: 0 0 0 3px rgba(64,145,108,0.15);
    }
    .campo input::placeholder, .campo textarea::placeholder { color: var(--suave); opacity: .6; }
    .campo select option { background: var(--card); }
    .campo textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    /* ── Opções radio/checkbox ── */
    .opcoes { display: flex; flex-direction: column; gap: .5rem; }
    .opcoes.horizontal { flex-direction: row; flex-wrap: wrap; }

    .opcao-item {
      display: flex; align-items: center; gap: .65rem;
      background: var(--card2); border: 1px solid var(--borda);
      border-radius: 10px; padding: .65rem 1rem; cursor: pointer;
      transition: border-color .18s, background .18s; font-size: .88rem;
      user-select: none;
    }
    .opcao-item:hover { border-color: var(--verde-mid); background: rgba(64,145,108,.07); }
    .opcao-item.sel    { border-color: var(--verde-mid); background: rgba(64,145,108,.14); color: var(--texto); }

    .opcao-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--borda); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .18s; position: relative;
    }
    .opcao-item.sel .opcao-dot { border-color: var(--verde-mid); }
    .opcao-dot::after {
      content:''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--verde-mid); display: none;
    }
    .opcao-item.sel .opcao-dot::after { display: block; }

    .opcao-box {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid var(--borda); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; transition: all .18s;
    }
    .opcao-item.sel .opcao-box { background: var(--verde-mid); border-color: var(--verde-mid); color: #fff; }

    /* ── Imagem no formulário ── */
    .campo-img {
      width: 100%; border-radius: 10px; margin-bottom: .5rem;
      object-fit: cover; max-height: 220px;
    }

    /* ── Erro ── */
    .campo.erro .campo input,
    .campo.erro .campo-input { border-color: #EF4444 !important; box-shadow: 0 0 0 3px rgba(239,68,68,.12) !important; }
    .erro-msg { font-size: .7rem; color: #EF4444; margin-top: .3rem; display: none; }
    .campo.erro .erro-msg { display: block; }

    /* ── Submit ── */
    .submit-area { text-align: center; margin-top: 1.5rem; }
    .btn-submit {
      background: var(--verde-mid); color: #fff;
      border: none; border-radius: 12px; padding: .95rem 2.5rem;
      font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 600;
      letter-spacing: .06em; cursor: pointer;
      box-shadow: 0 4px 20px rgba(64,145,108,.35);
      transition: background .2s, transform .15s, box-shadow .2s;
      display: inline-flex; align-items: center; gap: .6rem;
    }
    .btn-submit:hover { background: var(--verde-cl); color: var(--bg); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: .5; pointer-events: none; }

    /* ── Sucesso ── */
    .sucesso {
      display: none; text-align: center;
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 16px; padding: 3rem 2rem;
      box-shadow: var(--shadow);
    }
    .sucesso.show { display: block; }
    .sucesso-icon { font-size: 3rem; margin-bottom: 1rem; }
    .sucesso-titulo { font-family:'Cinzel',serif; font-size:1.3rem; color:var(--verde-cl); margin-bottom:.6rem; }
    .sucesso-msg { font-size:.85rem; color:var(--suave); line-height:1.7; }

    @media (max-width: 480px) {
      .form-titulo { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">
    <img src="assets/logo-abcl.svg" alt="ABCL" onerror="this.src='assets/logo-abcl.png'" />
    <span id="top-titulo">ABCL 2026</span>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Claro</button>
</div>
<div class="progress-bar"><div class="progress-bar-fill" id="prog-fill"></div></div>

<div class="page">

  <!-- Header -->
  <div class="form-header" id="form-header">
    <div class="form-logo">
      <img src="assets/logo-abcl.svg" alt="ABCL" onerror="this.src='assets/logo-abcl.png'" />
    </div>
    <h1 class="form-titulo" id="f-titulo">Carregando...</h1>
    <p class="form-subtitulo" id="f-subtitulo"></p>
  </div>

  <!-- Campos gerados dinamicamente -->
  <div id="form-body"></div>

  <!-- Submit -->
  <div class="submit-area" id="submit-area">
    <button class="btn-submit" id="btn-submit" onclick="enviarFormulario()">
      📋 <span id="btn-label">Enviar inscrição</span>
    </button>
    <p style="font-size:.72rem;color:var(--suave);margin-top:.75rem;line-height:1.6;">
      Suas respostas serão enviadas para a coordenação.
    </p>
  </div>

  <!-- Sucesso -->
  <div class="sucesso" id="sucesso">
    <div class="sucesso-icon">✅</div>
    <div class="sucesso-titulo">Enviado com sucesso!</div>
    <p class="sucesso-msg">
      Sua inscrição foi registrada com sucesso.<br>
      A coordenação entrará em contato em breve.
    </p>
    <a href="index.html" style="display:inline-block;margin-top:1.25rem;color:var(--verde-cl);font-size:.82rem;text-decoration:none;">← Voltar ao site</a>
  </div>

  <div style="text-align:center;margin-top:2.5rem;font-size:.68rem;color:var(--suave);">
    © 2026 Mocidade da Casa de Oração
    <a href="admin.html" style="color:rgba(116,198,157,.2);margin-left:.5rem;text-decoration:none;">⚙</a>
  </div>
</div>

<script>
// ── Tema ──
(function() {
  const t = localStorage.getItem('abcl-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀️ Claro' : '🌙 Escuro';
})();
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙 Escuro' : '☀️ Claro';
  localStorage.setItem('abcl-theme', dark ? 'light' : 'dark');
}

// ── Storage ──
const get = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };

// ── Defaults ──
function getDefaultPerguntas() {
  return [
    { id:1, tipo:'radio',    label:'É sua primeira vez no ABCL?',               obrig:true,  opcoes:['Sim, primeira vez! 🎉','Já fui em edições anteriores'] },
    { id:2, tipo:'select',   label:'Faixa etária',                               obrig:true,  opcoes:['Abaixo de 14 anos','14–17 anos','18–24 anos','25–35 anos','Acima de 35 anos'] },
    { id:3, tipo:'texto',    label:'De qual cidade você vem?',                   obrig:true,  placeholder:'Ex: Conselheiro Lafaiete...' },
    { id:4, tipo:'radio',    label:'Como ficou sabendo do acampamento?',         obrig:true,  opcoes:['Instagram','WhatsApp / indicação de amigo','Igreja','Já conhecia de outros anos','Outro'] },
    { id:5, tipo:'radio',    label:'Toca instrumento ou canta?',                 obrig:true,  opcoes:['Sim — instrumento','Sim — canto','Ambos','Não'] },
    { id:6, tipo:'texto',    label:'Se sim, qual(is) instrumento(s)?',           obrig:false, placeholder:'Ex: violão, bateria, piano...' },
    { id:7, tipo:'radio',    label:'Interesse em servir na organização do ABCL?',obrig:true,  opcoes:['Sim, adoraria! 🙋','Talvez','Não desta vez'] },
    { id:8, tipo:'textarea', label:'Alguma expectativa ou palavra para compartilhar?', obrig:false, placeholder:'Compartilhe o que quiser...' },
  ];
}


// ── Carregar formulário pelo ?id= da URL ──
// 1) Carrega localmente (instantâneo). 2) Busca a versão publicada no Firebase
// (coleção `forms`) e re-renderiza — é assim que o formulário criado no Admin
// chega aos visitantes em qualquer aparelho.
function _escolherForm(lista, urlId) {
  if (urlId) return lista.find(f => String(f.id) === String(urlId)) || null;
  return lista.find(f => f.id === 'perfil') || lista.find(f => f.ativo) || lista[0] || null;
}

(function carregarFormulario() {
  const urlId = new URLSearchParams(window.location.search).get('id');
  let formData = null;

  try {
    const lista = JSON.parse(localStorage.getItem('abcl-forms-lista') || '[]');
    formData = _escolherForm(lista, urlId);
  } catch(e) {}

  if (!formData) {
    // Fallback padrão caso não exista nada no localStorage
    formData = {
      titulo: 'Perfil do Acampante',
      subtitulo: 'Conte um pouco mais sobre você 🏕️',
      whats: '5531988262599',
      btnLabel: 'Enviar inscrição',
      capa: '',
      perguntas: getDefaultPerguntas(),
    };
  }

  // Expor como constantes globais usadas pelo restante do código
  window.CONFIG    = formData;
  window.PERGUNTAS = (formData.perguntas && formData.perguntas.length > 0)
    ? formData.perguntas
    : getDefaultPerguntas();

  // 2) Versão publicada no Firebase (fonte da verdade para visitantes)
  if (window._fdb) (async () => {
    try {
      let remoto = null;
      if (urlId) {
        const doc = await _fdb.collection('forms').doc(String(urlId)).get();
        if (doc.exists && !doc.data().excluido) remoto = doc.data();
      } else {
        const snap = await _fdb.collection('forms').get();
        const vivos = snap.docs.map(d => d.data()).filter(f => !f.excluido);
        remoto = _escolherForm(vivos, null);
      }
      // Só re-renderiza se achou algo e o visitante ainda não começou a responder
      if (remoto && Object.keys(respostas).length === 0) {
        window.CONFIG    = remoto;
        window.PERGUNTAS = (remoto.perguntas && remoto.perguntas.length > 0) ? remoto.perguntas : getDefaultPerguntas();
        montarFormulario();
        atualizarTotalFinanceiro();
      }
    } catch (e) { console.warn('[Form] usando versão local (Firebase indisponível)', e.message); }
  })();
})();

// ── Respostas coletadas ──
const respostas = {};

// ── Montar formulário ──
function montarFormulario() {
  document.getElementById('f-titulo').textContent    = CONFIG.titulo    || 'Formulário';
  document.getElementById('f-subtitulo').textContent = CONFIG.subtitulo || '';
  document.getElementById('top-titulo').textContent  = CONFIG.titulo    || 'ABCL';
  document.getElementById('btn-label').textContent   = CONFIG.btnLabel  || 'Enviar inscrição';

  if (CONFIG.capa) {
    const img = document.createElement('img');
    img.src = CONFIG.capa; img.className = 'capa-img';
    document.getElementById('form-header').insertAdjacentElement('beforebegin', img);
  }

  // Janela de agendamento: fora dela, bloqueia e nem monta o formulário
  if (_bloquearForaDeJanela()) return;

  // Formulário real (com id) mas sem nenhuma pergunta → em construção (não cai nos padrões)
  if (CONFIG.id && (!CONFIG.perguntas || CONFIG.perguntas.length === 0)) {
    document.querySelectorAll('#form-body, .form-header, #submit-area, #fin-total-bar').forEach(el => { if (el) el.style.display = 'none'; });
    const s = document.getElementById('sucesso');
    s.classList.add('show');
    s.innerHTML = `
      <div style="font-size:3rem;margin-bottom:1rem;">🚧</div>
      <div style="font-family:'Cinzel',serif;font-size:1.25rem;color:var(--verde-cl);margin-bottom:.6rem;">Formulário em construção</div>
      <p style="font-size:.88rem;color:var(--suave);line-height:1.7;max-width:380px;margin:0 auto;">Este formulário ainda não tem perguntas configuradas. Volte em breve.</p>
      <a href="index.html" style="display:block;margin-top:1.25rem;color:var(--verde-cl);font-size:.78rem;text-decoration:none;">← Voltar ao site</a>
    `;
    return;
  }

  const body = document.getElementById('form-body');
  body.innerHTML = '';

  PERGUNTAS.forEach((p, i) => {
    if (p.tipo === 'secao') {
      const el = document.createElement('div');
      el.className = 'form-secao';
      el.innerHTML = `
        <div class="secao-titulo">${p.label || ''}</div>
        ${p.desc ? `<div class="secao-desc">${p.desc}</div>` : ''}
      `;
      body.appendChild(el);
      return;
    }

    if (p.tipo === 'imagem') {
      if (!p.imagemUrl) return;
      const el = document.createElement('div');
      el.style.marginBottom = '1rem';
      el.innerHTML = `<img src="${p.imagemUrl}" class="capa-img" style="max-height:260px;" />`;
      body.appendChild(el);
      return;
    }

    const secao = document.createElement('div');
    secao.className = 'form-secao';
    secao.innerHTML = `
      <div class="campo" id="campo-${p.id}">
        <div class="campo-label">
          ${i+1}. ${p.label}
          ${p.obrig ? '<span class="req">*</span>' : ''}
        </div>
        ${p.desc ? `<div class="campo-desc">${p.desc}</div>` : ''}
        <div id="input-wrap-${p.id}">${renderCampo(p)}</div>
        <div class="erro-msg" id="erro-${p.id}">Campo obrigatório.</div>
      </div>
    `;
    body.appendChild(secao);
  });

  _renderTermo(body);
  atualizarProgresso();
}

// Renderiza o bloco fixo de Termo de aceite / Regulamento (opcional, no fim do formulário)
function _renderTermo(body) {
  if (!CONFIG.termoAtivo) return;
  const box = document.createElement('div');
  box.className = 'campo'; box.id = 'campo-termo';
  box.style.cssText = 'font-family:inherit;border:1px solid var(--borda,#2a3a32);border-radius:12px;padding:1.1rem;background:rgba(0,0,0,.12);';

  const titulo = document.createElement('div');
  titulo.style.cssText = "font-family:inherit;font-size:.82rem;font-weight:600;color:var(--verde-cl);margin-bottom:.7rem;letter-spacing:.01em;";
  titulo.textContent = '📜 Termos e Regulamento';

  const texto = document.createElement('div');
  texto.style.cssText = 'font-family:inherit;white-space:pre-wrap;height:300px;min-height:160px;max-height:70vh;overflow:auto;resize:vertical;font-size:.85rem;line-height:1.65;color:var(--texto);background:rgba(0,0,0,.2);border:1px solid var(--borda,#2a3a32);border-radius:8px;padding:.9rem 1rem;';
  texto.textContent = CONFIG.termoTexto || '';

  const lbl = document.createElement('label');
  lbl.style.cssText = 'display:flex;gap:.55rem;align-items:center;justify-content:center;margin-top:1rem;cursor:pointer;text-align:left;';
  const chk = document.createElement('input');
  chk.type = 'checkbox'; chk.id = 'termo-aceite-check';
  chk.style.cssText = 'width:18px;height:18px;min-width:18px;flex:0 0 auto;margin:0;accent-color:var(--verde-mid);cursor:pointer;';
  chk.addEventListener('change', () => {
    box.style.outline = ''; atualizarProgresso();
  });
  const span = document.createElement('span');
  span.style.cssText = 'font-family:inherit;font-size:.85rem;color:var(--texto);';
  span.textContent = CONFIG.termoLabel || 'Li e concordo com os termos e o regulamento.';
  lbl.appendChild(chk); lbl.appendChild(span);

  box.appendChild(titulo); box.appendChild(texto); box.appendChild(lbl);
  body.appendChild(box);
}

function renderCampo(p) {
  if (p.tipo === 'texto') {
    return `<input type="text" id="inp-${p.id}" placeholder="${p.placeholder||''}"
      oninput="salvarResposta(${p.id},this.value);atualizarProgresso()" />`;
  }
  if (p.tipo === 'numero') {
    return `<input type="number" id="inp-${p.id}" placeholder="${p.placeholder||''}"
      oninput="salvarResposta(${p.id},this.value);atualizarProgresso()" />`;
  }
  if (p.tipo === 'textarea') {
    return `<textarea id="inp-${p.id}" placeholder="${p.placeholder||''}"
      oninput="salvarResposta(${p.id},this.value);atualizarProgresso()"></textarea>`;
  }
  if (p.tipo === 'select') {
    const opts = (p.opcoes||[]).map(o => `<option value="${o}">${o}</option>`).join('');
    return `<select id="inp-${p.id}" onchange="salvarResposta(${p.id},this.value);atualizarProgresso()">
      <option value="">Selecione...</option>${opts}</select>`;
  }
  if (p.tipo === 'radio') {
    return `<div class="opcoes" id="opc-${p.id}">
      ${(p.opcoes||[]).map(o => `
        <label class="opcao-item" onclick="selecionarOpcao(${p.id},'${escapar(o)}',this,'radio')">
          <div class="opcao-dot"></div> ${o}
        </label>`).join('')}
    </div>`;
  }
  if (p.tipo === 'checkbox') {
    return `<div class="opcoes" id="opc-${p.id}">
      ${(p.opcoes||[]).map(o => `
        <label class="opcao-item" onclick="selecionarOpcao(${p.id},'${escapar(o)}',this,'checkbox')">
          <div class="opcao-box"></div> ${o}
        </label>`).join('')}
    </div>`;
  }
  if (p.tipo === 'financeiro') {
    return `<div class="opcoes" id="opc-${p.id}">
      ${(p.opcoes||[]).map(o => { const v = _valorBRL(o); return `
        <label class="opcao-item" data-opt="${escapar(o)}" onclick="selecionarOpcao(${p.id},'${escapar(o)}',this,'financeiro')" style="display:flex;align-items:center;gap:.6rem;">
          <div class="opcao-box"></div>
          <span style="flex:1;">${_rotuloSemValor(o)}</span>
          ${v > 0 ? `<span style="font-weight:700;color:var(--verde-cl);white-space:nowrap;">R$ ${_fmtBRL(v)}</span>` : ''}
        </label>`; }).join('')}
    </div>`;
  }
  return '';
}

// ── Valores monetários (tipo "Vínculo financeiro") ──
function _valorBRL(s) {
  const m = String(s||'').match(/R\$\s*([\d.]+(?:,\d{1,2})?)/);
  if (!m) return 0;
  return parseFloat(m[1].replace(/\./g,'').replace(',','.')) || 0;
}
function _rotuloSemValor(s) { return String(s||'').replace(/\s*[—–\-]*\s*R\$\s*[\d.,]+\s*$/,'').trim(); }
function _fmtBRL(v) { return (v||0).toFixed(2).replace('.',','); }

function _totalFinanceiro() {
  let t = 0;
  PERGUNTAS.forEach(p => {
    if (p.tipo !== 'financeiro') return;
    String(respostas[p.id]||'').split(', ').filter(Boolean).forEach(o => { t += _valorBRL(o); });
  });
  return t;
}

// Barra "Total selecionado" acima do botão de envio (só se houver pergunta financeira)
function atualizarTotalFinanceiro() {
  if (!PERGUNTAS.some(p => p.tipo === 'financeiro')) return;
  let bar = document.getElementById('fin-total-bar');
  if (!bar) {
    const sa = document.getElementById('submit-area');
    if (!sa) return;
    sa.insertAdjacentHTML('beforebegin', `
      <div id="fin-total-bar" style="display:flex;justify-content:space-between;align-items:center;background:rgba(64,145,108,.1);border:1px solid rgba(64,145,108,.3);border-radius:10px;padding:.85rem 1.1rem;margin:1rem 0;">
        <span style="font-size:.85rem;color:var(--suave);">💰 Total selecionado</span>
        <strong id="fin-total-valor" style="font-size:1.15rem;color:var(--verde-cl);">R$ 0,00</strong>
      </div>`);
    bar = document.getElementById('fin-total-bar');
  }
  document.getElementById('fin-total-valor').textContent = 'R$ ' + _fmtBRL(_totalFinanceiro());
}

function escapar(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function salvarResposta(id, val) {
  respostas[id] = val;
  const campo = document.getElementById(`campo-${id}`);
  if (campo) campo.classList.remove('erro');
}

function selecionarOpcao(id, val, el, tipo) {
  const wrap = document.getElementById(`opc-${id}`);
  if (tipo === 'radio') {
    wrap.querySelectorAll('.opcao-item').forEach(i => i.classList.remove('sel'));
    el.classList.add('sel');
    respostas[id] = val;
  } else {
    el.classList.toggle('sel');
    const selecionados = [...wrap.querySelectorAll('.opcao-item.sel')]
      .map(i => i.dataset.opt || i.textContent.trim());
    respostas[id] = selecionados.join(', ');
    const box = el.querySelector('.opcao-box');
    if (box) box.textContent = el.classList.contains('sel') ? '✓' : '';
    if (tipo === 'financeiro') atualizarTotalFinanceiro();
  }
  const campo = document.getElementById(`campo-${id}`);
  if (campo) campo.classList.remove('erro');
  atualizarProgresso();
}

// ── Progresso ──
function atualizarProgresso() {
  const obrigatorias = PERGUNTAS.filter(p => p.obrig && p.tipo !== 'secao' && p.tipo !== 'imagem');
  const respondidas  = obrigatorias.filter(p => respostas[p.id] && String(respostas[p.id]).trim());
  const pct = obrigatorias.length ? (respondidas.length / obrigatorias.length) * 100 : 0;
  document.getElementById('prog-fill').style.width = pct.toFixed(0) + '%';
}

// ── Validação ──
function validar() {
  let ok = true;
  PERGUNTAS.forEach(p => {
    if (!p.obrig || p.tipo === 'secao' || p.tipo === 'imagem') return;
    const val = respostas[p.id];
    if (!val || !String(val).trim()) {
      document.getElementById(`campo-${p.id}`)?.classList.add('erro');
      ok = false;
    }
  });
  // Termo de aceite (quando ativo, é obrigatório marcar)
  if (CONFIG.termoAtivo) {
    const chk = document.getElementById('termo-aceite-check');
    if (!chk || !chk.checked) {
      const box = document.getElementById('campo-termo');
      if (box) { box.style.outline = '2px solid #EF4444'; box.style.outlineOffset = '2px'; box.classList.add('erro'); }
      ok = false;
    }
  }
  return ok;
}

// ── Janela de agendamento (ativar/desativar) — espelha _statusAgendamento do admin ──
function _statusFormulario() {
  // 'ativo' | 'agendado' | 'expirado' | 'inativo'
  const agora = new Date();
  const ini = CONFIG.agendaInicio ? new Date(CONFIG.agendaInicio) : null;
  const fim = CONFIG.agendaFim    ? new Date(CONFIG.agendaFim)    : null;
  if (ini && agora < ini) return 'agendado';
  if (fim && agora > fim)  return 'expirado';
  if (ini && agora >= ini && (!fim || agora <= fim)) return 'ativo';
  // Sem janela definida: só bloqueia se o formulário foi explicitamente desativado
  return (CONFIG.ativo === false) ? 'inativo' : 'ativo';
}

function _fmtDataAgenda(iso) {
  try { return new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch (e) { return ''; }
}

// Bloqueia a tela quando fora da janela. Retorna true se bloqueou.
function _bloquearForaDeJanela() {
  const s = _statusFormulario();
  if (s === 'ativo') return false;

  let icone, titulo, msg;
  if (s === 'agendado') {
    icone = '🗓️'; titulo = 'As inscrições ainda não abriram';
    msg = CONFIG.agendaInicio ? `As inscrições abrem em <strong>${_fmtDataAgenda(CONFIG.agendaInicio)}</strong>.` : 'Volte em breve.';
  } else if (s === 'expirado') {
    icone = '⏳'; titulo = 'Inscrições encerradas';
    msg = CONFIG.agendaFim ? `O prazo terminou em <strong>${_fmtDataAgenda(CONFIG.agendaFim)}</strong>.` : 'O prazo para este formulário já passou.';
  } else {
    icone = '🔒'; titulo = 'Inscrições indisponíveis';
    msg = 'Este formulário não está aberto no momento.';
  }

  document.querySelectorAll('#form-body, .form-header, #submit-area, #fin-total-bar').forEach(el => { if (el) el.style.display = 'none'; });
  const prog = document.getElementById('prog-fill'); if (prog) prog.style.width = '100%';
  const el = document.getElementById('sucesso');
  el.classList.add('show');
  el.innerHTML = `
    <div style="font-size:3rem;margin-bottom:1rem;">${icone}</div>
    <div style="font-family:'Cinzel',serif;font-size:1.25rem;color:var(--verde-cl);margin-bottom:.6rem;">${titulo}</div>
    <p style="font-size:.88rem;color:var(--suave);line-height:1.7;max-width:380px;margin:0 auto;">${msg}</p>
    ${CONFIG.whats ? `<a href="https://wa.me/${CONFIG.whats}" target="_blank" rel="noopener"
      style="display:inline-flex;align-items:center;gap:.5rem;margin-top:1.25rem;background:var(--verde-mid);color:#fff;padding:.7rem 1.4rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:.86rem;">💬 Falar com a organização</a>` : ''}
    <a href="index.html" style="display:block;margin-top:1rem;color:var(--verde-cl);font-size:.78rem;text-decoration:none;">← Voltar ao site</a>
  `;
  return true;
}

// ── Envio ──
let _enviando = false;
async function enviarFormulario() {
  if (_enviando) return;                  // trava reentrada (duplo-clique durante a checagem)
  if (_bloquearForaDeJanela()) return;    // janela de agendamento (defesa no submit)
  if (!validar()) {
    const primeiro = document.querySelector('.campo.erro');
    if (primeiro) primeiro.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  _enviando = true;
  const btn = document.querySelector('#submit-area button');
  if (btn) { btn.disabled = true; btn.textContent = 'Verificando…'; }

  // ── Verificar vagas disponíveis (contagem global no Firestore) ──
  let vagasStatus = 'ok';
  try { vagasStatus = await verificarVagas(); }
  catch (e) { console.warn('[Form] checagem de vagas falhou, prosseguindo:', (e && e.message) || e); vagasStatus = 'ok'; }

  if (vagasStatus === 'lotado') {
    mostrarLotado(); return;              // tela terminal
  }
  if (vagasStatus === 'fila') {
    enviarComoFila(); return;             // mantém botão travado e mostra sucesso
  }

  _executarEnvio();
}

async function verificarVagas() {
  if (!CONFIG.vagasMasc && !CONFIG.vagasFem && !CONFIG.vagasGeral) return 'ok';
  // Sem Firestore ou sem id não há como contar globalmente → não bloqueia (admin reconcilia).
  if (!window._fdb || !CONFIG.id) return 'ok';

  let confirmadas;
  try {
    // Uma leitura simples por form_id (sem índice composto); filtra a fila no cliente.
    const snap = await _fdb.collection('inscricoes').where('form_id', '==', String(CONFIG.id)).get();
    confirmadas = snap.docs.map(d => d.data()).filter(r => (r.status_inscricao || 'confirmada') !== 'fila');
  } catch (e) {
    console.warn('[Form] não foi possível checar vagas no Firebase, prosseguindo:', (e && (e.code || e.message)) || e);
    return 'ok';
  }

  const total = confirmadas.length;
  const pSexo = PERGUNTAS.find(p => p.label && p.label.toLowerCase().includes('sexo'));
  const sexoAtual = pSexo ? respostas[pSexo.id] : '';

  if (CONFIG.vagasGeral > 0 && total >= CONFIG.vagasGeral) {
    return CONFIG.filaEspera ? 'fila' : 'lotado';
  }
  if (CONFIG.vagasMasc > 0 && sexoAtual === 'Masculino') {
    const masc = confirmadas.filter(r => (r.sexo || '') === 'Masculino').length;
    if (masc >= CONFIG.vagasMasc) return CONFIG.filaEspera ? 'fila' : 'lotado';
  }
  if (CONFIG.vagasFem > 0 && sexoAtual === 'Feminino') {
    const fem = confirmadas.filter(r => (r.sexo || '') === 'Feminino').length;
    if (fem >= CONFIG.vagasFem) return CONFIG.filaEspera ? 'fila' : 'lotado';
  }
  return 'ok';
}

function mostrarLotado() {
  document.querySelectorAll('#form-body, .form-header, #submit-area').forEach(el => el.style.display = 'none');
  document.getElementById('prog-fill').style.width = '100%';

async function enviarComoFila() {
  // Registra no sistema com status de fila de espera (sem WhatsApp)
  _salvarInsight(true);
  const reg = _montarRegistroInscricao();
  const btn = document.querySelector('#submit-area button');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
  let online = true;
  try { await _gravarNoFirebase(reg, 'fila'); }
  catch (e) {
    online = false;
    console.error('[Form] Falha ao gravar (fila) no Firebase:', (e && (e.code || e.message)) || e, e);
    try {
      const fila = JSON.parse(localStorage.getItem('abcl-inscricoes-pendentes') || '[]');
      fila.push({ reg, status: 'fila', em: Date.now() });
      localStorage.setItem('abcl-inscricoes-pendentes', JSON.stringify(fila));
    } catch (_) {}

  _mostrarSucesso(reg, online, true);
}

function _salvarInsight(filaEspera = false) {
  try {
    const lista = JSON.parse(localStorage.getItem('abcl-insights') || '[]');
    lista.unshift({ ts: Date.now(), data: new Date().toLocaleDateString('pt-BR'), formId: (CONFIG && CONFIG.id) || '', filaEspera, ...respostas });
    localStorage.setItem('abcl-insights', JSON.stringify(lista.slice(0, 500)));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
// GRAVAÇÃO NO FIREBASE — coleções `acampantes` (pessoa, permanente)
// e `inscricoes` (resposta deste formulário). O WhatsApp segue como
// canal de confirmação; o banco é o registro oficial.
// ══════════════════════════════════════════════════════════════
function _soDigitos(s){ return String(s||'').replace(/\D/g,''); }
function _slug(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40); }

// Extrai um campo das respostas procurando palavras-chave no rótulo da pergunta
function _respostaPorLabel(regex) {
  const p = PERGUNTAS.find(p => p.label && regex.test(p.label.toLowerCase()));
  return p ? String(respostas[p.id] || '').trim() : '';
}

function _montarRegistroInscricao() {
  const nome     = _respostaPorLabel(/nome/);
  const telefone = _soDigitos(_respostaPorLabel(/telefone|whatsapp|celular/));
  const email    = _respostaPorLabel(/e-?mail/);
  const sexo     = _respostaPorLabel(/sexo/);

  // Mapa legível: rótulo → resposta (sobrevive a mudanças de ids entre edições)
  const mapa = {};
  PERGUNTAS.forEach(p => {
    if (p.tipo === 'secao' || p.tipo === 'imagem') return;
    const r = respostas[p.id];
    if (r !== undefined && String(r).trim() !== '') mapa[p.label] = r;
  });

  // Itens com valor (perguntas do tipo "Vínculo financeiro") → vão para o Financeiro
  const itens_financeiros = [];
  let valor_total = 0;
  PERGUNTAS.forEach(p => {
    if (p.tipo !== 'financeiro') return;
    String(respostas[p.id]||'').split(', ').filter(Boolean).forEach(o => {
      const v = _valorBRL(o);
      itens_financeiros.push({ descricao: _rotuloSemValor(o), valor: v });
      valor_total += v;
    });
  });

  // Código curto da inscrição (referência para o inscrito e a organização)
  const codigo = 'ABCL-' + Date.now().toString(36).toUpperCase().slice(-5) + Math.floor(Math.random()*10);

  // Chave de IDEMPOTÊNCIA: id único e imprevisível do documento da inscrição.
  // Usada como id do doc no Firestore → reenvio (após timeout) sobrescreve o
  // MESMO doc em vez de criar duplicata. Gerada uma vez e preservada na fila offline.
  const idem = (self.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : ('i-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,12) + Math.random().toString(36).slice(2,12));

  // Chave do acampante: telefone + nome (telefone pode ser compartilhado — ex.: menor usa o do responsável)
  const acampanteId = (telefone || nome) ? `a${telefone || 'x'}_${_slug(nome) || 'sem-nome'}` : null;

  // Aceite do termo (quando o formulário tem termo ativo)
  const aceiteTermo = CONFIG.termoAtivo ? !!document.getElementById('termo-aceite-check')?.checked : null;

  return { nome, telefone, email, sexo, mapa, acampanteId, itens_financeiros, valor_total, codigo, idem, aceiteTermo };
}

async function _gravarNoFirebase(reg, status) {
  if (!window._fdb) return;
  const FV = firebase.firestore.FieldValue;

  // 1) INSCRIÇÃO primeiro — registro oficial da resposta.
  //    Id determinístico (idem) → se ESTA falhar (offline/permissão), o erro
  //    propaga e o chamador põe na fila; ao reenviar, sobrescreve o MESMO doc
  //    em vez de duplicar. Itens legados (sem idem) usam uma chave estável.
  const idDoc = reg.idem || ('legacy-' + (reg.codigo || Date.now()) + '-' + (reg.telefone || 'x'));
  await _fdb.collection('inscricoes').doc(idDoc).set({
    idem: idDoc,
    codigo: reg.codigo || null,
    form_id: String(CONFIG.id || 'sem-id'),
    form_titulo: CONFIG.titulo || '',
    acampante_id: reg.acampanteId || null,
    nome: reg.nome, telefone: reg.telefone, email: reg.email || null, sexo: reg.sexo || null,
    respostas: reg.mapa,
    itens_financeiros: reg.itens_financeiros || [],
    valor_total: reg.valor_total || 0,
    status_pagamento: 'pendente',
    forma_pagamento: (reg.mapa['Pagamento - Dinheiro ou PIX?'] || _respostaPorLabel(/pagamento/) || null),
    status_inscricao: status || 'confirmada',   // 'confirmada' | 'fila'
    origem: 'formulario',
    aceite_termo: (reg.aceiteTermo === undefined ? null : reg.aceiteTermo),
    criado_em: FV.serverTimestamp(),
  });

  // 2) ACAMPANTE — upsert do cadastro permanente, SÓ com identificador (nome/telefone)
  //    e em BEST-EFFORT: se falhar, a inscrição já está salva — apenas loga, sem
  //    derrubar o envio nem reprocessar (evita inscrição duplicada na fila).
  if (reg.acampanteId) {
    try {
      await _fdb.collection('acampantes').doc(reg.acampanteId).set({
        nome: reg.nome, nome_busca: _slug(reg.nome),
        telefone: reg.telefone, email: reg.email || null, sexo: reg.sexo || null,
        dados: reg.mapa,
        atualizado_em: FV.serverTimestamp(),
      }, { merge: true });
    } catch (e) {
      console.error('[Form] Inscrição gravada, mas falhou ao atualizar o cadastro do acampante:', (e && (e.code || e.message)) || e);
    }
  }
}

// Reenvia pendências ao abrir a página
(function _retomarPendentes() {
  if (!window._fdb) return;
  let fila = [];
  try { fila = JSON.parse(localStorage.getItem('abcl-inscricoes-pendentes') || '[]'); } catch(_) {}
  if (!fila.length) return;
  (async () => {
    const restantes = [];
    for (const item of fila) {
      try { await _gravarNoFirebase(item.reg, item.status); }
      catch (e) { console.error('[Form] Pendente ainda falhando:', (e && (e.code || e.message)) || e); restantes.push(item); }
    }
    localStorage.setItem('abcl-inscricoes-pendentes', JSON.stringify(restantes));
    if (restantes.length < fila.length) console.log(`[Form] ${fila.length - restantes.length} inscrição(ões) pendente(s) enviada(s).`);
  })();
})();

async function _executarEnvio() {
  _salvarInsight(false);
  const reg = _montarRegistroInscricao();
  const btn = document.querySelector('#submit-area button');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
  let online = true;
  try { await _gravarNoFirebase(reg, 'confirmada'); }
  catch (e) {
    online = false;
    console.error('[Form] Falha ao gravar no Firebase:', (e && (e.code || e.message)) || e, e);
    if (e && e.code === 'permission-denied') console.error('[Form] ⚠️ permission-denied: as regras do Firestore não permitem escrita pública em acampantes/inscricoes.');
    try {
      const fila = JSON.parse(localStorage.getItem('abcl-inscricoes-pendentes') || '[]');
      fila.push({ reg, status: 'confirmada', em: Date.now() });
      localStorage.setItem('abcl-inscricoes-pendentes', JSON.stringify(fila));
    } catch (_) {}
  }
  _mostrarSucesso(reg, online, false);
}

// Tela de confirmação (a inscrição agora vai para o sistema, não para o WhatsApp)
function _mostrarSucesso(reg, online, ehFila) {
  // Esconde TODO o formulário: cabeçalho, perguntas, termo, barra de total e botão.
  document.querySelectorAll('.form-header, #form-body, #submit-area, #fin-total-bar').forEach(el => { if (el) el.style.display = 'none'; });
  const s = document.getElementById('sucesso');
  const temValor = (reg.valor_total || 0) > 0;
  s.classList.add('show');

  const check = `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.3 4.3L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const relogio = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7.5V12l3 1.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  s.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:1.1rem;max-width:380px;margin:0 auto;">

      <div style="width:60px;height:60px;border-radius:50%;background:rgba(64,145,108,.18);display:flex;align-items:center;justify-content:center;color:var(--verde-cl);">
        ${ehFila ? relogio : check}
      </div>

      <div>
        <div style="font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--suave);margin-bottom:.35rem;">
          ${ehFila ? 'Fila de espera' : 'Inscrição registrada'}</div>
        <div style="font-family:'Cinzel',serif;font-size:1.35rem;color:var(--texto);line-height:1.25;">
          ${ehFila ? 'Você está na fila' : (reg.nome || 'Acampante')}</div>
      </div>

      ${ehFila ? `
      <p style="color:var(--suave);font-size:.85rem;line-height:1.6;margin:0;">
        ${CONFIG.filaMsg || 'As vagas se esgotaram, mas sua inscrição ficou registrada na fila. Entraremos em contato caso uma vaga se abra.'}</p>` : ''}

      <div style="width:100%;background:var(--card2);border-radius:10px;padding:1rem;display:flex;flex-direction:column;gap:.25rem;">
        <div style="font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--suave);">Código da inscrição</div>
        <div style="font-size:1.5rem;font-weight:600;letter-spacing:.12em;color:var(--verde-cl);font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;">${reg.codigo}</div>
        <div style="font-size:.7rem;color:var(--suave);">Guarde este código para consultas</div>
      </div>

      ${temValor ? `
      <div style="width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--card2);border-radius:10px;padding:.75rem 1rem;">
        <span style="color:var(--suave);font-size:.85rem;">Total da inscrição</span>
        <b style="color:var(--texto);font-size:1.05rem;">R$ ${_fmtBRL(reg.valor_total)}</b>
      </div>
      <p style="color:var(--suave);font-size:.78rem;margin:-.4rem 0 0;line-height:1.5;">A organização entrará em contato para confirmar o pagamento.</p>` : ''}

      ${!online ? `
      <p style="color:var(--amarelo,#E0A500);font-size:.78rem;line-height:1.55;margin:0;">📡 Sem conexão no momento — sua inscrição foi <b>salva neste aparelho</b> e será enviada automaticamente quando você abrir esta página com internet.</p>` : ''}

      <div style="width:100%;display:flex;flex-direction:column;gap:.5rem;margin-top:.25rem;">
        ${CONFIG.whats ? `
        <a href="https://wa.me/${CONFIG.whats}" target="_blank" rel="noopener"
           style="display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;box-sizing:border-box;background:var(--verde-mid);color:#fff;padding:.8rem;border-radius:10px;text-decoration:none;font-size:.9rem;font-weight:600;">💬 Falar com a organização</a>` : ''}
        <a href="index.html"
           style="display:flex;align-items:center;justify-content:center;gap:.4rem;color:var(--suave);font-size:.82rem;text-decoration:none;padding:.4rem;">← Voltar ao site</a>
      </div>

    </div>
  `;
  document.getElementById('prog-fill').style.width = '100%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

montarFormulario();
atualizarTotalFinanceiro();
</script>
</body>
