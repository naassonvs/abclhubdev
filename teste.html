<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Firebase - ABCL Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    pre {
      background: #222;
      color: #0f0;
      padding: 20px;
      border-radius: 5px;
      overflow-x: auto;
      min-height: 300px;
      font-size: 12px;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin: 10px 5px 10px 0;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .buttons {
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>🔥 Teste Firebase - ABCL Hub</h1>
  
  <div class="buttons">
    <button onclick="testarSalvarVenda()">📝 Salvar Venda</button>
    <button onclick="testarBuscarVendas()">🔍 Buscar Vendas</button>
    <button onclick="testarResumoFinanceiro()">💰 Resumo Financeiro</button>
    <button onclick="limparLog()">🗑️ Limpar Log</button>
  </div>

  <pre id="log"></pre>

  <!-- 1️⃣ Firebase CDN - DEVE ESTAR ANTES DE QUALQUER SCRIPT QUE USE FIREBASE -->
  <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>

  <!-- 2️⃣ Firebase Config - Inicializa Firebase -->
  <script defer src="firebase-config-cdn.js"></script>
  
  <!-- 3️⃣ Database Helper - Usa Firebase -->
  <script defer src="db-cdn.js"></script>

  <!-- 4️⃣ Script de Teste - Usa tudo acima -->
  <script defer>
    let logElement;

    function addLog(mensagem) {
      if (!logElement) {
        logElement = document.getElementById('log');
      }
      logElement.textContent += mensagem + '\n';
      logElement.scrollTop = logElement.scrollHeight;
    }

    function limparLog() {
      if (!logElement) {
        logElement = document.getElementById('log');
      }
      logElement.textContent = '';
    }

    // Verificar se Firebase está pronto
    function verificarFirebase() {
      console.log('🔍 Verificando Firebase...');
      console.log('window.firebaseApp:', window.firebaseApp);
      console.log('window.db:', window.db);
      
      if (!window.firebaseApp || !window.db) {
        console.warn('⏳ Aguardando Firebase carregar...');
        setTimeout(verificarFirebase, 500);
        return;
      }
      
      addLog('✅ Firebase pronto para usar!\n');
    }

    async function testarSalvarVenda() {
      try {
        if (!window.db) {
          addLog('❌ Firebase ainda não está pronto. Aguarde...\n');
          return;
        }

        addLog('⏳ Salvando venda...\n');
        
        const vendaId = await window.db.salvarVenda({
          tipo: 'vendinha',
          produto: 'Suco Natural',
          quantidade: 3,
          valor: 15.00,
          forma_pagamento: 'dinheiro',
          operador_uid: 'operador_001',
          ano_acampamento: 2025
        });

        addLog(`✅ Venda salva com sucesso!\n`);
        addLog(`ID: ${vendaId}\n`);
        
      } catch (erro) {
        addLog(`❌ Erro: ${erro.message}\n`);
        console.error('Erro completo:', erro);
      }
    }

    async function testarBuscarVendas() {
      try {
        if (!window.db) {
          addLog('❌ Firebase ainda não está pronto. Aguarde...\n');
          return;
        }

        addLog('⏳ Buscando vendas de 2025...\n');
        
        const vendas = await window.db.buscarVendasPorAno(2025);
        
        addLog(`✅ ${vendas.length} vendas encontradas!\n`);
        addLog(`\nDetalhes:\n`);
        vendas.forEach((venda, index) => {
          addLog(`\n${index + 1}. ID: ${venda.id}`);
          addLog(`   Produto: ${venda.produto}`);
          addLog(`   Valor: R$ ${venda.valor}`);
          addLog(`   Módulo: ${venda.tipo}`);
        });
        
      } catch (erro) {
        addLog(`❌ Erro: ${erro.message}\n`);
        console.error('Erro completo:', erro);
      }
    }

    async function testarResumoFinanceiro() {
      try {
        if (!window.db) {
          addLog('❌ Firebase ainda não está pronto. Aguarde...\n');
          return;
        }

        addLog('⏳ Calculando resumo financeiro...\n');
        
        const resumo = await window.db.buscarResumoFinanceiro(2025);
        
        addLog(`✅ Resumo Financeiro - 2025\n`);
        addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━\n`);
        addLog(`Total Arrecadado: R$ ${resumo.totalArrecadado.toFixed(2)}\n`);
        addLog(`Total Vendas: R$ ${resumo.totalVendas.toFixed(2)}\n`);
        addLog(`Total Inscrições: R$ ${resumo.totalInscricoes.toFixed(2)}\n`);
        addLog(`Quantidade de Vendas: ${resumo.quantidadeVendas}\n`);
        addLog(`Quantidade de Inscrições: ${resumo.quantidadeInscricoes}\n`);
        
      } catch (erro) {
        addLog(`❌ Erro: ${erro.message}\n`);
        console.error('Erro completo:', erro);
      }
    }

    // Inicializar quando página carregar
    document.addEventListener('DOMContentLoaded', function() {
      logElement = document.getElementById('log');
      addLog('⏳ Carregando Firebase...\n');
      verificarFirebase();
    });
  </script>
</body>
</html>
